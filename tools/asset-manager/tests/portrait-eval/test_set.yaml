# 立绘评估固定测试集 v1
# 用途：M1 评估脚手架的标准输入集。每轮版本（v0/v1/...）都用同一份测试集跑 5 角色 × 4 variants = 20 张图，
# 以便横向对比 style_base / description prompt 改动的影响。
#
# 字段说明：
#   name          ：角色名（与 batch_config.json / workspace characters 对齐）
#   archetype     ：角色类型标签，供评分表归类，不进入生成 prompt
#   focus         ：该角色评估时需重点关注的维度（供人工评分记录时参考）
#   novel_refs    ：从《雪中悍刀行》原文中摘录的面部 / 气质 / 服饰描述片段。
#                   仅作为 Phase B（description 层）迭代时的 ground truth 参考，M1 阶段不接入生成链路。
#   variants      ：固定 4 条。索引 1-4 对应生成脚本中的 variant 序号。
#                   variant_hint 仅作为 Phase B 迭代中定向重写的可选输入（M1 不使用，保留占位）。

version: 1
variants_per_character: 4

characters:
  - name: 徐凤年
    archetype: 主角 + 贵气公子
    focus: 面部辨识度（气质贵而不奢、脸型不过长）、贵气 vs 狂气切换、色温不泛黄
    novel_refs:
      - "面如冠玉，眉眼清朗，笑起来有一种漫不经心的懒散。"
      - "腰佩凉刀，身着青衫，举止看似落拓不羁，实则腰背挺直如刀。"
      - "年少锦衣，鬓角偶插一根白玉簪，袖口绣暗纹，贵气内敛不张扬。"
      - "眉宇间有少年意气，也有久经风霜的沉郁，一双眼睛亮得惊人。"
      - "北凉世子，最爱在腰间悬一壶酒，嬉笑怒骂皆成风流。"
    variants:
      - index: 1
        variant_hint: "北凉世子锦衣公子形象，佩凉刀"
      - index: 2
        variant_hint: "游历江湖落拓布衣形象，腰悬酒壶"
      - index: 3
        variant_hint: "披甲武将状态，凉刀出鞘半寸"
      - index: 4
        variant_hint: "雪中负手远眺的沉郁宗师气象"

  - name: 老黄
    archetype: 老者 + 随从（深藏不露的剑奴）
    focus: 苍老但不猥琐、仆役装束、佝偻与剑客气质并存
    novel_refs:
      - "须发花白，脸上沟壑纵横，笑时露出一口残缺的黄牙。"
      - "常年背着一柄沉重的木剑匣，身形佝偻，走路一瘸一拐。"
      - "穿灰扑扑的短褐，腰间一根粗布带，打扮像寻常老马夫。"
      - "眼神浑浊中带着一点看尽生死的平静，笑起来像憨厚的乡下老人。"
      - "看似不起眼的老马夫，实则剑道通神的高人。"
    variants:
      - index: 1
        variant_hint: "佝偻老马夫背剑匣的日常形象"
      - index: 2
        variant_hint: "出剑瞬间脊背挺直、剑光乍现的刹那"
      - index: 3
        variant_hint: "坐在石头上磨剑，短褐灰袍，目光低垂"
      - index: 4
        variant_hint: "风雪中握剑而立，老迈身形掩不住剑意"

  - name: 温华
    archetype: 江湖少年（落魄剑痴 → 放下剑的俗人）
    focus: 清瘦少年感、剑痴执拗 vs 归于平淡的对比、不要太仙气
    novel_refs:
      - "瘦高少年，颧骨略突出，眼神执拗而明亮。"
      - "一身打了补丁的青布短袍，腰里常别一柄竹剑或木剑。"
      - "笑起来咧嘴露齿，带着小市民的狡黠，又有江湖人的傲气。"
      - "头发随意束起，鬓角乱翘，不修边幅但干净。"
      - "年少时自诩江湖第一剑，折剑之后成了卖烧饼的俗人。"
    variants:
      - index: 1
        variant_hint: "持木剑练剑的执拗少年"
      - index: 2
        variant_hint: "江湖行走，补丁青袍配破包袱"
      - index: 3
        variant_hint: "大笑着与人对饮，酒碗在手"
      - index: 4
        variant_hint: "折剑后挑着烧饼担子的市井模样"

  - name: 姜泥
    archetype: 少女（亡国公主、外柔内刚）
    focus: 少女感但不萝莉化、隐忍的倔强、亡国气质不能写成写实哭脸
    novel_refs:
      - "小巧鹅蛋脸，眼角微微上挑，瞳色清亮带一点执拗。"
      - "一身素净布裙，粗布缝制却浆洗得干净，发辫随意垂在肩侧。"
      - "体态纤瘦，身量不高，站姿带着小兽般的戒备。"
      - "平日寡言，咬唇时显出一点少女倔强；偶尔抬眼，眸中有亡国的哀与不甘。"
      - "大楚亡国公主，却被豢养在北凉王府做婢女，手上常沾泥点。"
    variants:
      - index: 1
        variant_hint: "婢女粗布裙，手提水桶的日常"
      - index: 2
        variant_hint: "独坐一隅捻花发呆，神情疏离"
      - index: 3
        variant_hint: "双手握短剑练习的倔强少女"
      - index: 4
        variant_hint: "风中回眸一眼，亡国意味若隐若现"

  - name: 李淳罡
    archetype: 剑圣（老年剑神、天象境）
    focus: 苍老剑神威仪、独臂（若出现则必须缺右臂）、剑意而非外形繁复
    novel_refs:
      - "白发披肩，须发皆白，面容清癯，颧骨分明，眼神幽深如古井。"
      - "右臂齐肩而断，空袖被风吹得猎猎作响。"
      - "一身洗得发白的青灰道袍，脚踏旧布鞋，背一柄朴素木剑。"
      - "站立时脊背如松，气息内敛，举手投足间剑意自生。"
      - "两袖青蛇、剑开天门的陆地剑仙，老而弥辣，独臂亦可斩断长河。"
    variants:
      - index: 1
        variant_hint: "独臂老剑神拄剑而立，空袖随风"
      - index: 2
        variant_hint: "出剑一瞬，白发飞扬，青衫猎猎"
      - index: 3
        variant_hint: "盘坐石上闭目养神，剑横膝上"
      - index: 4
        variant_hint: "御剑凌空的刹那，脚下剑气升腾（不画背景，仅靠姿态表现）"
